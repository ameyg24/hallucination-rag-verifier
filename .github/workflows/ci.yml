name: ci

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Install
        run: python -m pip install -r requirements.txt
      - name: Start server
        run: |
          python -m uvicorn app.main:app --port 8000 > /tmp/uvicorn.log 2>&1 &
          sleep 2
      - name: Load index
        run: |
          python - <<'PY'
          import requests
          r = requests.post("http://127.0.0.1:8000/load_index", timeout=10)
          print(r.status_code, r.text)
          PY
      - name: Eval
        run: python scripts/run_eval.py
